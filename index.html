<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timestamp Tool — Unix Timestamp Converter</title>
<meta name="description" content="Convert between Unix timestamps, ISO 8601, and human-readable dates. Current time, relative time, timezone support. Free, instant.">
<meta property="og:title" content="Timestamp Tool — Unix Timestamp Converter">
<meta property="og:description" content="Convert Unix timestamps, ISO 8601, human dates. Free.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://yurukusa.github.io/timestamp-tool/">
<meta name="twitter:card" content="summary_large_image">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:24px 16px}
h1{font-size:1.8rem;text-align:center;margin:32px 0 8px;color:#fff}
.subtitle{text-align:center;color:#888;margin-bottom:28px;font-size:0.95rem}

.now-bar{text-align:center;background:#161616;border:1px solid #222;border-radius:12px;padding:20px;margin-bottom:24px}
.now-label{font-size:0.78rem;color:#888;margin-bottom:6px}
.now-unix{font-family:'Fira Code',monospace;font-size:1.6rem;color:#4da6ff;cursor:pointer}
.now-unix:hover{color:#6dc0ff}
.now-iso{font-family:'Fira Code',monospace;font-size:0.9rem;color:#10b981;margin-top:6px}
.now-relative{font-size:0.78rem;color:#555;margin-top:4px}

.converter{background:#161616;border:1px solid #222;border-radius:12px;padding:20px;margin-bottom:16px}
.converter h2{font-size:1rem;color:#fff;margin-bottom:14px}
.input-row{display:flex;gap:10px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
.input-row label{font-size:0.82rem;color:#888;font-weight:600;min-width:80px}
.input-row input,.input-row select{padding:10px 14px;border-radius:8px;border:1px solid #333;background:#0a0a0a;color:#ddd;font-family:'Fira Code',monospace;font-size:0.85rem;outline:none;flex:1;min-width:0}
.input-row input:focus{border-color:#3b82f6}
.btn{padding:8px 18px;border-radius:8px;border:1px solid #333;background:#161616;color:#888;font-size:0.82rem;cursor:pointer;font-weight:600}
.btn:hover{border-color:#555;color:#ccc}
.btn.primary{background:#3b82f6;border-color:#3b82f6;color:#fff}
.btn.primary:hover{background:#2563eb}
.btn-row{display:flex;gap:8px;justify-content:center;margin:12px 0;flex-wrap:wrap}

.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.result-card{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:10px;padding:14px;cursor:pointer;transition:border-color 0.2s}
.result-card:hover{border-color:#3b82f6}
.result-card .label{font-size:0.72rem;color:#888;margin-bottom:4px;text-transform:uppercase;font-weight:600}
.result-card .value{font-family:'Fira Code',monospace;font-size:0.82rem;color:#10b981;word-break:break-all}

.presets{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:20px}
.preset{padding:6px 12px;border-radius:8px;border:1px solid #333;background:#161616;color:#888;font-size:0.75rem;cursor:pointer;font-weight:600}
.preset:hover{border-color:#555;color:#ccc}

.diff-section{background:#161616;border:1px solid #222;border-radius:12px;padding:20px;margin-bottom:16px}
.diff-section h2{font-size:1rem;color:#fff;margin-bottom:14px}
.diff-result{text-align:center;font-family:'Fira Code',monospace;font-size:0.9rem;color:#f59e0b;min-height:24px;margin-top:10px}

.copied{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:8px 20px;border-radius:8px;font-size:0.85rem;font-weight:600;z-index:100;animation:fadeOut 1.5s forwards}
@keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0}}

footer{text-align:center;padding:32px 0;color:#555;font-size:0.78rem;border-top:1px solid #1a1a1a;margin-top:40px}
footer a{color:#666;text-decoration:none}
footer a:hover{color:#999}
@media(max-width:600px){.result-grid{grid-template-columns:1fr}.input-row{flex-direction:column}.input-row label{min-width:auto}}
</style>
</head>
<body>
<div class="container">
<h1>Timestamp Tool</h1>
<p class="subtitle">Convert between Unix timestamps, ISO 8601, and human-readable dates.</p>

<!-- Current Time -->
<div class="now-bar">
  <div class="now-label">Current Unix Timestamp</div>
  <div class="now-unix" id="nowUnix" onclick="copyText(this.textContent)"></div>
  <div class="now-iso" id="nowIso"></div>
  <div class="now-relative" id="nowTz"></div>
</div>

<!-- Quick Presets -->
<div class="presets">
  <button class="preset" onclick="setInput(0)">Epoch (0)</button>
  <button class="preset" onclick="setInput(Date.now()/1000|0)">Now</button>
  <button class="preset" onclick="setInput(1000000000)">1 Billion</button>
  <button class="preset" onclick="setInput(2000000000)">2 Billion</button>
  <button class="preset" onclick="setInput(Date.now()/1000+86400|0)">Tomorrow</button>
  <button class="preset" onclick="setInput(Date.now()/1000+604800|0)">Next Week</button>
  <button class="preset" onclick="setInput(4102444800)">2100-01-01</button>
</div>

<!-- Converter -->
<div class="converter">
  <h2>Convert Timestamp</h2>
  <div class="input-row">
    <label>Input</label>
    <input type="text" id="tsInput" placeholder="Unix timestamp, ISO 8601, or date string..." value="1709251200" oninput="convert()">
  </div>
  <div class="input-row">
    <label>Format</label>
    <select id="unitSelect" onchange="convert()">
      <option value="auto">Auto-detect</option>
      <option value="seconds">Seconds</option>
      <option value="milliseconds">Milliseconds</option>
      <option value="iso">ISO 8601</option>
    </select>
  </div>
  <div class="btn-row">
    <button class="btn primary" onclick="convert()">Convert</button>
    <button class="btn" onclick="$('tsInput').value=Date.now()/1000|0;convert()">Now</button>
    <button class="btn" onclick="$('tsInput').value='';$('results').innerHTML=''">Clear</button>
  </div>
  <div class="result-grid" id="results"></div>
</div>

<!-- Time Diff -->
<div class="diff-section">
  <h2>Time Difference</h2>
  <div class="input-row">
    <label>From</label>
    <input type="text" id="diffFrom" placeholder="Timestamp or date..." value="">
  </div>
  <div class="input-row">
    <label>To</label>
    <input type="text" id="diffTo" placeholder="Timestamp or date (default: now)" value="">
  </div>
  <div class="btn-row">
    <button class="btn primary" onclick="calcDiff()">Calculate</button>
  </div>
  <div class="diff-result" id="diffResult"></div>
</div>

</div>

<footer>
  <a href="https://github.com/yurukusa/timestamp-tool">GitHub</a> ·
  Part of <a href="https://yurukusa.github.io/dev-toolkit/">Dev Toolkit</a> (20 free tools)
</footer>

<script>
const $=id=>document.getElementById(id);

// Live clock
function updateNow(){
  const now=Date.now();
  const unix=Math.floor(now/1000);
  $('nowUnix').textContent=unix;
  $('nowIso').textContent=new Date(now).toISOString();
  $('nowTz').textContent='Local: '+new Date(now).toString().replace(/ \(.+\)/,'')+' · Click timestamp to copy';
}
updateNow();
setInterval(updateNow,1000);

function parseInput(val,unit){
  val=val.trim();
  if(!val)return null;

  if(unit==='seconds')return new Date(Number(val)*1000);
  if(unit==='milliseconds')return new Date(Number(val));
  if(unit==='iso')return new Date(val);

  // Auto-detect
  // Pure number
  if(/^\d+$/.test(val)){
    const n=Number(val);
    // If 13+ digits, treat as milliseconds
    if(val.length>=13)return new Date(n);
    // Otherwise seconds
    return new Date(n*1000);
  }
  // Negative number (before epoch)
  if(/^-\d+$/.test(val)){
    const n=Number(val);
    if(val.length>=14)return new Date(n);
    return new Date(n*1000);
  }
  // Try as date string
  const d=new Date(val);
  if(!isNaN(d.getTime()))return d;
  return null;
}

function relativeTime(date){
  const now=Date.now();
  const diff=date.getTime()-now;
  const abs=Math.abs(diff);
  const suffix=diff<0?'ago':'from now';

  if(abs<60000)return Math.floor(abs/1000)+' seconds '+suffix;
  if(abs<3600000)return Math.floor(abs/60000)+' minutes '+suffix;
  if(abs<86400000)return Math.floor(abs/3600000)+' hours '+suffix;
  if(abs<2592000000)return Math.floor(abs/86400000)+' days '+suffix;
  if(abs<31536000000)return Math.floor(abs/2592000000)+' months '+suffix;
  return Math.floor(abs/31536000000)+' years '+suffix;
}

function dayOfYear(d){
  const start=new Date(d.getFullYear(),0,0);
  const diff=d-start;
  return Math.floor(diff/86400000);
}

function weekNumber(d){
  const oneJan=new Date(d.getFullYear(),0,1);
  return Math.ceil(((d-oneJan)/86400000+oneJan.getDay()+1)/7);
}

function convert(){
  const val=$('tsInput').value;
  const unit=$('unitSelect').value;
  const date=parseInput(val,unit);
  if(!date||isNaN(date.getTime())){
    $('results').innerHTML='<div style="grid-column:1/-1;text-align:center;color:#ef4444;padding:20px">Invalid input</div>';
    return;
  }

  const unix=Math.floor(date.getTime()/1000);
  const ms=date.getTime();

  const cards=[
    {label:'Unix (seconds)',value:unix},
    {label:'Unix (milliseconds)',value:ms},
    {label:'ISO 8601',value:date.toISOString()},
    {label:'UTC',value:date.toUTCString()},
    {label:'Local',value:date.toLocaleString()},
    {label:'Relative',value:relativeTime(date)},
    {label:'Day of Year',value:dayOfYear(date)+' / 365'},
    {label:'Week Number',value:'Week '+weekNumber(date)},
    {label:'Day of Week',value:['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][date.getDay()]},
    {label:'Is Leap Year',value:(date.getFullYear()%4===0&&(date.getFullYear()%100!==0||date.getFullYear()%400===0))?'Yes':'No'},
  ];

  $('results').innerHTML=cards.map(c=>`
    <div class="result-card" onclick="copyText('${String(c.value).replace(/'/g,"\\'")}')">
      <div class="label">${c.label}</div>
      <div class="value">${c.value}</div>
    </div>
  `).join('');
}

function calcDiff(){
  const from=parseInput($('diffFrom').value,'auto');
  const toVal=$('diffTo').value.trim();
  const to=toVal?parseInput(toVal,'auto'):new Date();

  if(!from||isNaN(from.getTime())){
    $('diffResult').textContent='Invalid "From" value';return;
  }
  if(!to||isNaN(to.getTime())){
    $('diffResult').textContent='Invalid "To" value';return;
  }

  const diffMs=Math.abs(to.getTime()-from.getTime());
  const secs=Math.floor(diffMs/1000);
  const mins=Math.floor(secs/60);
  const hrs=Math.floor(mins/60);
  const days=Math.floor(hrs/24);
  const years=Math.floor(days/365.25);

  const parts=[];
  if(years>0)parts.push(years+' year'+(years>1?'s':''));
  if(days%365>0)parts.push((days%365)+' day'+((days%365)>1?'s':''));
  if(hrs%24>0)parts.push((hrs%24)+' hour'+((hrs%24)>1?'s':''));
  if(mins%60>0)parts.push((mins%60)+' min'+((mins%60)>1?'s':''));

  $('diffResult').textContent=`${parts.join(', ')} (${secs.toLocaleString()} seconds / ${days.toLocaleString()} days)`;
}

function setInput(v){
  $('tsInput').value=v;
  $('unitSelect').value='seconds';
  convert();
}

function copyText(text){
  navigator.clipboard.writeText(text);
  const el=document.createElement('div');
  el.className='copied';el.textContent='Copied!';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

// Init
convert();
</script>
</body>
</html>
